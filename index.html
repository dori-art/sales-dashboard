<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>매출 대시보드 — 더커피</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue:#185FA5; --blue-lt:#E6F1FB;
  --amber:#BA7517; --amber-lt:#FAEEDA;
  --green:#1D9E75; --green-lt:#E1F5EE;
  --bg:#fff; --bg2:#f7f8fa; --bg3:#f0f2f5;
  --text:#1a1a1a; --text2:#5a6272; --text3:#9aa0ac;
  --border:rgba(0,0,0,0.1); --border2:rgba(0,0,0,0.18);
  --radius:10px; --radius-sm:6px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1d23; --bg2:#22262e; --bg3:#2a2f3a;
  --text:#e8eaf0; --text2:#9aa0ac; --text3:#5a6272;
  --border:rgba(255,255,255,0.1); --border2:rgba(255,255,255,0.18);
  --blue-lt:#0d2d4a; --amber-lt:#3d2800; --green-lt:#0a2e22;
}}
body { font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:var(--bg3); color:var(--text); min-height:100vh; }
.container { max-width:920px; margin:0 auto; padding:1.5rem 1rem 3rem; }

/* header */
header { display:flex; align-items:center; gap:8px; margin-bottom:1.25rem; flex-wrap:wrap; }
header h1 { font-size:18px; font-weight:600; }
.badge { font-size:11px; padding:2px 8px; border-radius:20px; background:var(--blue-lt); color:var(--blue); font-weight:500; }
.spacer { flex:1; }
.status-dot { width:7px; height:7px; border-radius:50%; background:#ccc; flex-shrink:0; }
.status-dot.ok { background:var(--green); }
.status-dot.err { background:#E24B4A; }
.save-status { font-size:11px; color:var(--text3); display:flex; align-items:center; gap:5px; }
.hdr-btn { display:inline-flex; align-items:center; gap:4px; padding:5px 12px; font-size:12px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg); color:var(--text2); cursor:pointer; transition:all .1s; white-space:nowrap; }
.hdr-btn:hover { background:var(--bg2); color:var(--text); }
.hdr-btn.blue { background:var(--blue); color:#fff; border-color:var(--blue); }
.hdr-btn.blue:hover { opacity:.88; }
.hdr-btn:disabled { opacity:.4; cursor:not-allowed; }

/* card */
.card { background:var(--bg); border-radius:var(--radius); border:0.5px solid var(--border); padding:1.25rem; margin-bottom:1rem; }

/* upload */
#dropzone { border:1.5px dashed var(--border2); border-radius:var(--radius); padding:1.75rem 1.5rem; text-align:center; cursor:pointer; background:var(--bg2); transition:background .15s,border-color .15s; }
#dropzone:hover,#dropzone.drag { background:var(--blue-lt); border-color:var(--blue); }
#dropzone.filled { border-style:solid; border-color:var(--green); background:var(--green-lt); }
.chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; justify-content:center; }
.chip { display:inline-flex; align-items:center; gap:5px; background:var(--bg); border:0.5px solid var(--border); border-radius:20px; padding:4px 11px; font-size:12px; color:var(--text2); }
.chip-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.chip .x { cursor:pointer; color:var(--text3); font-size:14px; line-height:1; margin-left:2px; }
.chip .x:hover { color:#E24B4A; }

/* upload mode toggle */
.mode-row { display:flex; gap:6px; margin-bottom:1rem; }
.mode-btn { padding:5px 14px; font-size:12px; border-radius:20px; cursor:pointer; border:0.5px solid var(--border2); background:var(--bg); color:var(--text2); transition:all .1s; }
.mode-btn.on { background:var(--blue); color:#fff; border-color:var(--blue); }

/* controls */
.ctrl-bar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:1rem; }
.ctrl-lbl { font-size:12px; color:var(--text2); white-space:nowrap; }
select { font-size:13px; padding:5px 10px; height:34px; border-radius:var(--radius-sm); border:0.5px solid var(--border2); background:var(--bg); color:var(--text); cursor:pointer; }
#storeSel { min-width:170px; }
.date-sep { font-size:12px; color:var(--text3); }
.preset-btns { display:flex; gap:4px; }
.pb { padding:5px 10px; font-size:11px; border-radius:20px; cursor:pointer; border:0.5px solid var(--border2); background:var(--bg); color:var(--text2); transition:all .1s; user-select:none; white-space:nowrap; }
.pb.on { background:var(--blue); color:#fff; border-color:var(--blue); }
.pb:hover:not(.on) { background:var(--bg2); }

/* calendar */
.cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-nav button { background:none; border:none; cursor:pointer; color:var(--text2); font-size:18px; padding:2px 10px; border-radius:6px; line-height:1; }
.cal-nav button:hover { background:var(--bg2); }
.cal-title { font-size:13px; font-weight:600; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.dow { font-size:10px; color:var(--text3); text-align:center; padding:3px 0; }
.dow:first-child { color:#E24B4A; }
.dow:last-child { color:var(--blue); }
.day { font-size:12px; text-align:center; border-radius:7px; cursor:default; transition:background .1s; min-height:38px; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding-top:5px; }
.day.has-data { cursor:pointer; }
.day.has-data:hover { filter:brightness(.93); }
.day.empty,.day.no-data { color:var(--text3); }
.day.has-data { color:var(--text); }
.day.in-range { background:var(--blue-lt) !important; }
.day.range-start,.day.range-end { background:var(--blue) !important; color:#fff !important; font-weight:600; }
.day.today .dn::after { content:''; display:block; width:3px; height:3px; border-radius:50%; background:var(--blue); margin:1px auto 0; }
.day.range-start .dn::after,.day.range-end .dn::after { background:rgba(255,255,255,.7); }
.dn { font-size:12px; line-height:1; }
.da { font-size:9px; color:var(--text3); margin-top:2px; }
.day.has-data .da { color:var(--green); }
.day.in-range .da { color:var(--blue); }
.day.range-start .da,.day.range-end .da { color:rgba(255,255,255,.75); }
.range-hint { font-size:11px; color:var(--text3); text-align:center; margin:6px 0 0; min-height:15px; }

/* kpi */
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-bottom:1rem; }
.kpi { background:var(--bg2); border-radius:var(--radius-sm); padding:.8rem 1rem; }
.kpi-l { font-size:11px; color:var(--text2); margin-bottom:3px; }
.kpi-v { font-size:21px; font-weight:600; line-height:1.1; }
.kpi-s { font-size:10px; color:var(--text3); margin-top:2px; }

/* chart */
.peak-pill { display:inline-flex; align-items:center; gap:4px; background:var(--amber-lt); color:#633806; font-size:11px; padding:2px 9px; border-radius:20px; font-weight:600; }
.legend { display:flex; flex-wrap:wrap; gap:14px; margin-bottom:10px; font-size:12px; color:var(--text2); }
.legend span { display:flex; align-items:center; gap:5px; }
.ld { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.cw { position:relative; width:100%; height:260px; }

/* toast */
.toast { position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); background:#1a1a1a; color:#fff; font-size:13px; padding:10px 18px; border-radius:8px; z-index:999; opacity:0; transition:opacity .2s; pointer-events:none; }
.toast.show { opacity:1; }

/* overlay */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:100; display:none; align-items:center; justify-content:center; }
.overlay.show { display:flex; }
.modal { background:var(--bg); border-radius:var(--radius); padding:1.5rem; max-width:360px; width:90%; }
.modal h3 { font-size:15px; font-weight:600; margin-bottom:8px; }
.modal p { font-size:13px; color:var(--text2); line-height:1.6; margin-bottom:1.25rem; }
.modal-btns { display:flex; gap:8px; justify-content:flex-end; }
</style>
</head>
<body>
<div class="container">

<header>
  <h1>매출 대시보드</h1>
  <span class="badge">더커피</span>
  <span class="spacer"></span>
  <span class="save-status"><span class="status-dot" id="dbDot"></span><span id="dbStatus">DB 연결 확인 중...</span></span>
  <input id="jsonIn" type="file" accept=".json" style="display:none" onchange="loadJSON(this)">
  <div class="hdr-btn" onclick="document.getElementById('jsonIn').click()">↓ JSON 불러오기</div>
  <div class="hdr-btn blue" onclick="exportJSON()">↑ JSON 내보내기</div>
</header>

<!-- UPLOAD -->
<div id="dropzone"
  onclick="document.getElementById('fi').click()"
  ondragover="event.preventDefault();this.classList.add('drag')"
  ondragleave="this.classList.remove('drag')"
  ondrop="onDrop(event)">
  <input id="fi" type="file" accept=".xlsx,.xls" multiple style="display:none" onchange="onFiles(this.files)">
  <div style="font-size:24px;margin-bottom:6px">↑</div>
  <div style="font-size:14px;font-weight:600;margin-bottom:3px">엑셀 파일 업로드</div>
  <div style="font-size:12px;color:var(--text2)">매장별 신용카드 매출 상세내역 (.xlsx) · 여러 파일 동시 가능 · 파일명 = 매장명</div>
  <div class="chips" id="chips"></div>
</div>

<!-- DASHBOARD -->
<div id="dash" style="display:none;margin-top:1rem">

  <div class="card">
    <div class="ctrl-bar">
      <span class="ctrl-lbl">매장</span>
      <select id="storeSel" onchange="onStoreChange()"></select>
      <span class="ctrl-lbl">기간</span>
      <div class="preset-btns">
        <div class="pb" onclick="setPreset(7,this)">7일</div>
        <div class="pb on" onclick="setPreset(30,this)">30일</div>
        <div class="pb" onclick="setPreset(0,this)">전체</div>
      </div>
    </div>
    <div class="ctrl-bar" style="margin-bottom:.75rem">
      <span class="ctrl-lbl">시작일</span>
      <select id="startSel" onchange="onDateSelChange()"></select>
      <span class="date-sep">~</span>
      <span class="ctrl-lbl">종료일</span>
      <select id="endSel" onchange="onDateSelChange()"></select>
    </div>
    <div class="cal-nav">
      <button onclick="moveMonth(-1)">‹</button>
      <span class="cal-title" id="calTitle"></span>
      <button onclick="moveMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="range-hint" id="rangeHint"></div>
  </div>

  <div class="kpi-grid" id="kpis"></div>

  <div class="card">
    <div style="margin-bottom:8px;min-height:22px" id="peakLine"></div>
    <div class="legend">
      <span><span class="ld" style="background:#378ADD"></span>일반 시간대</span>
      <span><span class="ld" style="background:#BA7517"></span>피크 시간대</span>
    </div>
    <div class="cw"><canvas id="hc"></canvas></div>
  </div>

</div>
</div>

<!-- 중복 확인 모달 -->
<div class="overlay" id="dupOverlay">
  <div class="modal">
    <h3>이미 있는 데이터예요</h3>
    <p id="dupMsg"></p>
    <div class="modal-btns">
      <div class="hdr-btn" onclick="closeDupModal(false)">취소</div>
      <div class="hdr-btn blue" onclick="closeDupModal(true)">덮어쓰기</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ★ 여기에 Supabase 정보 입력
const SUPABASE_URL = 'https://xbnywrttrwsqexdazffa.supabase.co/rest/v1/';   // 예: https://xbnywrttrwsqexdazffa.supabase.co
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inhibnl3cnR0cndzcWV4ZGF6ZmZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMjIwNTgsImV4cCI6MjA5MzY5ODA1OH0.1Xu59aOHKSSKMPKpFfJqjh9oLWRsDvZ3FbLbc5EfFSA';  // eyJ... 로 시작하는 긴 키

const COLORS = ['#185FA5','#1D9E75','#BA7517','#993556','#533FAB','#0F6E56'];
let stores = {};
let curStore = 'all';
let rangeStart = null, rangeEnd = null, pickingEnd = false;
let calYear, calMonth;
let hChart = null;
let pendingRows = null, pendingStore = null, pendingResolve = null;

// ── Supabase API ─────────────────────────────────────────
async function sbFetch(path, options={}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers
    }
  });
  return res;
}

async function checkDB() {
  try {
    const res = await sbFetch('sales?select=id&limit=1');
    if (res.ok) {
      document.getElementById('dbDot').className = 'status-dot ok';
      document.getElementById('dbStatus').textContent = 'DB 연결됨';
      loadFromDB();
    } else {
      throw new Error();
    }
  } catch {
    document.getElementById('dbDot').className = 'status-dot err';
    document.getElementById('dbStatus').textContent = 'DB 연결 실패 — 키 확인 필요';
  }
}

async function loadFromDB() {
  try {
    // 한 번에 최대 1000건 → 페이지네이션
    let all = [], offset = 0, limit = 1000;
    while (true) {
      const res = await sbFetch(`sales?select=store,date,hour,amt,is_cancel&order=date.asc&limit=${limit}&offset=${offset}`);
      const rows = await res.json();
      if (!Array.isArray(rows) || rows.length === 0) break;
      all = all.concat(rows);
      if (rows.length < limit) break;
      offset += limit;
    }
    stores = {};
    all.forEach(r => {
      const s = r.store;
      if (!stores[s]) stores[s] = [];
      stores[s].push({ hour: r.hour, date: r.date, amt: r.amt, isCancel: r.is_cancel });
    });
    if (Object.keys(stores).length) initDash();
    showToast(`DB에서 ${all.length.toLocaleString()}건 불러옴`);
  } catch(e) {
    showToast('DB 로드 실패');
  }
}

async function saveToDB(storeName, rows) {
  const payload = rows.map(r => ({
    store: storeName,
    date: r.date,
    hour: r.hour,
    amt: r.amt,
    is_cancel: r.isCancel
  }));
  // upsert — 중복 인덱스 충돌 시 무시
  const res = await sbFetch('sales', {
    method: 'POST',
    prefer: 'resolution=ignore-duplicates,return=minimal',
    headers: { 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
    body: JSON.stringify(payload)
  });
  return res.ok;
}

async function deleteStoreDates(storeName, dates) {
  // 특정 매장의 특정 날짜들 삭제 (덮어쓰기용)
  for (const date of dates) {
    await sbFetch(`sales?store=eq.${encodeURIComponent(storeName)}&date=eq.${date}`, {
      method: 'DELETE'
    });
  }
}

// ── JSON 저장/불러오기 ────────────────────────────────────
function exportJSON() {
  if (!Object.keys(stores).length) { showToast('먼저 데이터를 불러오세요'); return; }
  const blob = new Blob([JSON.stringify(stores, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '매출데이터_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.json';
  a.click();
}

function loadJSON(input) {
  const f = input.files[0]; if (!f) return;
  const rd = new FileReader();
  rd.onload = ev => {
    try {
      stores = JSON.parse(ev.target.result);
      initDash();
      showToast('JSON 불러오기 완료');
    } catch(e) { showToast('올바른 JSON 파일이 아닙니다'); }
  };
  rd.readAsText(f);
  input.value = '';
}

// ── 중복 모달 ────────────────────────────────────────────
function showDupModal(storeName, dates) {
  return new Promise(resolve => {
    pendingResolve = resolve;
    document.getElementById('dupMsg').textContent =
      `"${storeName}"의 ${dates[0]} ~ ${dates[dates.length-1]} 데이터가 이미 있어요. 덮어쓸까요?`;
    document.getElementById('dupOverlay').classList.add('show');
  });
}
function closeDupModal(ok) {
  document.getElementById('dupOverlay').classList.remove('show');
  if (pendingResolve) { pendingResolve(ok); pendingResolve = null; }
}

// ── 파일 파싱 ────────────────────────────────────────────
function storeName(fname) {
  return fname.replace(/\.(xlsx?)$/i,'')
    .replace(/매출[_\s]상세내역[\(（]?신용카드[\)）]?_*/gi,'')
    .replace(/_?\d{8}$/g,'').replace(/^_+|_+$/g,'').trim() || fname;
}
function onDrop(e) { e.preventDefault(); document.getElementById('dropzone').classList.remove('drag'); onFiles(e.dataTransfer.files); }

function onFiles(flist) {
  [...flist].forEach(f => {
    const sn = storeName(f.name);
    const rd = new FileReader();
    rd.onload = async ev => {
      const wb = XLSX.read(ev.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const raw = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      const hi = raw.findIndex(r => Array.isArray(r) && r.includes('거래시간'));
      if (hi < 0) { showToast('형식이 맞지 않는 파일이에요'); return; }
      const H = raw[hi];
      const iT=H.indexOf('거래시간'), iD=H.indexOf('거래일자'), iA=H.indexOf('거래금액'), iG=H.indexOf('승인구분');
      const rows = [];
      for (let i = hi+1; i < raw.length; i++) {
        const r = raw[i];
        if (!r[iD] && !r[iT]) continue;
        const g = String(r[iG]||'');
        if (g === '승인거절') continue;
        const amt = parseInt(String(r[iA]||0).replace(/,/g,''))||0;
        const ts = String(r[iT]||'0').padStart(6,'0');
        const hour = parseInt(ts.slice(0,2));
        const ds = String(r[iD]||'');
        const date = ds.length===8 ? `${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}` : ds;
        const isCancel = g==='취소';
        rows.push({hour, date, amt: isCancel ? -Math.abs(amt) : amt, isCancel});
      }

      // 중복 체크
      const newDates = [...new Set(rows.map(r=>r.date))].sort();
      const existDates = stores[sn] ? [...new Set(stores[sn].map(r=>r.date))] : [];
      const overlap = newDates.filter(d => existDates.includes(d));

      if (overlap.length > 0) {
        const ok = await showDupModal(sn, overlap);
        if (!ok) { showToast('업로드 취소됨'); return; }
        // 덮어쓰기: 겹치는 날짜 삭제 후 재업로드
        if (stores[sn]) {
          stores[sn] = stores[sn].filter(r => !overlap.includes(r.date));
        }
        await deleteStoreDates(sn, overlap);
      }

      if (!stores[sn]) stores[sn] = [];
      stores[sn] = stores[sn].concat(rows);

      // DB 저장
      showToast('DB에 저장 중...');
      const ok = await saveToDB(sn, rows);
      if (ok) showToast(`${sn} 저장 완료 (${rows.length.toLocaleString()}건)`);
      else showToast('DB 저장 실패 — 키를 확인하세요');

      initDash();
    };
    rd.readAsArrayBuffer(f);
  });
}

// ── 초기화 ───────────────────────────────────────────────
function initDash() {
  renderChips();
  const names = Object.keys(stores);
  if (!names.length) return;
  const sel = document.getElementById('storeSel');
  const prev = sel.value;
  sel.innerHTML = names.length > 1 ? `<option value="all">전체 (${names.length}개 매장)</option>` : '';
  names.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
  curStore = names.includes(prev) ? prev : sel.value;
  sel.value = curStore;
  const allDates = getData(curStore).map(r=>r.date).filter(Boolean).sort();
  const last = allDates[allDates.length-1] || new Date().toISOString().slice(0,10);
  calYear = parseInt(last.slice(0,4));
  calMonth = parseInt(last.slice(5,7))-1;
  populateDateSelects();
  setPreset(30, document.querySelectorAll('.pb')[1]);
  document.getElementById('dash').style.display = 'block';
}

function onStoreChange() {
  curStore = document.getElementById('storeSel').value;
  rangeStart = null; rangeEnd = null;
  const allDates = getData(curStore).map(r=>r.date).filter(Boolean).sort();
  const last = allDates[allDates.length-1] || new Date().toISOString().slice(0,10);
  calYear = parseInt(last.slice(0,4));
  calMonth = parseInt(last.slice(5,7))-1;
  populateDateSelects();
  setPreset(30, document.querySelectorAll('.pb')[1]);
}

function removeStore(e, n) {
  e.stopPropagation();
  delete stores[n];
  renderChips();
  if (!Object.keys(stores).length) { document.getElementById('dash').style.display='none'; return; }
  initDash();
}

function renderChips() {
  const names = Object.keys(stores);
  document.getElementById('chips').innerHTML = names.map((n,i) =>
    `<span class="chip"><span class="chip-dot" style="background:${COLORS[i%6]}"></span>${n}<span class="x" onclick="removeStore(event,'${n}')">×</span></span>`
  ).join('');
  document.getElementById('dropzone').classList.toggle('filled', names.length > 0);
}

// ── 날짜 드롭다운 ─────────────────────────────────────────
function populateDateSelects() {
  const dates = [...new Set(getData(curStore).map(r=>r.date).filter(Boolean))].sort();
  const startSel = document.getElementById('startSel');
  const endSel = document.getElementById('endSel');
  startSel.innerHTML = dates.map(d=>`<option value="${d}">${d}</option>`).join('');
  endSel.innerHTML = dates.map(d=>`<option value="${d}">${d}</option>`).join('');
  if (rangeStart && dates.includes(rangeStart)) startSel.value = rangeStart;
  else startSel.value = dates[0]||'';
  if (rangeEnd && dates.includes(rangeEnd)) endSel.value = rangeEnd;
  else endSel.value = dates[dates.length-1]||'';
}

function onDateSelChange() {
  const s = document.getElementById('startSel').value;
  const e = document.getElementById('endSel').value;
  if (!s || !e) return;
  rangeStart = s <= e ? s : e;
  rangeEnd   = s <= e ? e : s;
  pickingEnd = false;
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  calYear = parseInt(rangeEnd.slice(0,4));
  calMonth = parseInt(rangeEnd.slice(5,7))-1;
  renderCal(); renderKpis(); renderHourly();
}

// ── 데이터 ───────────────────────────────────────────────
function getData(store) {
  if (store === 'all') return Object.values(stores).flat();
  return stores[store] || [];
}
function filtered() {
  const d = getData(curStore);
  if (!rangeStart) return d;
  const e = rangeEnd || rangeStart;
  return d.filter(r => r.date >= rangeStart && r.date <= e);
}
function dateAmtMap(store) {
  const m = {};
  getData(store).filter(r=>!r.isCancel).forEach(r => { m[r.date]=(m[r.date]||0)+r.amt; });
  return m;
}

// ── 달력 ────────────────────────────────────────────────
function moveMonth(dir) {
  calMonth += dir;
  if (calMonth>11){calMonth=0;calYear++;}
  else if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}
function renderCal() {
  const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calTitle').textContent = `${calYear}년 ${months[calMonth]}`;
  const amtMap = dateAmtMap(curStore);
  const maxAmt = Math.max(1, ...Object.values(amtMap));
  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map(d=>`<div class="dow">${d}</div>`).join('');
  const first = new Date(calYear,calMonth,1).getDay();
  for(let i=0;i<first;i++) html+=`<div class="day empty"></div>`;
  const dim = new Date(calYear,calMonth+1,0).getDate();
  const today = new Date().toISOString().slice(0,10);
  const re = rangeEnd||rangeStart;
  for(let d=1;d<=dim;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const amt=amtMap[ds]||0;
    const hasData=amt>0;
    let cls='day'+(hasData?' has-data':' no-data');
    if(ds===today) cls+=' today';
    if(rangeStart&&ds===rangeStart) cls+=' range-start';
    else if(re&&ds===re) cls+=' range-end';
    else if(rangeStart&&re&&ds>rangeStart&&ds<re) cls+=' in-range';
    const isStyled=cls.includes('range-start')||cls.includes('range-end')||cls.includes('in-range');
    const op=hasData?(0.2+0.8*(amt/maxAmt)).toFixed(2):0;
    const bg=hasData&&!isStyled?`background:rgba(29,158,117,${op})`:'';
    const daText=hasData?(amt>=10000?(amt/10000).toFixed(0)+'만':amt.toLocaleString()):'';
    html+=`<div class="${cls}" style="${bg}" onclick="onDayClick('${ds}')"><span class="dn">${d}</span><span class="da">${daText}</span></div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
  renderRangeHint();
}
function onDayClick(ds) {
  if(!dateAmtMap(curStore)[ds]) return;
  if(!rangeStart||(!pickingEnd&&rangeEnd)){rangeStart=ds;rangeEnd=null;pickingEnd=true;}
  else if(pickingEnd){
    if(ds<rangeStart){rangeEnd=rangeStart;rangeStart=ds;}else rangeEnd=ds;
    pickingEnd=false;
  }
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  syncDateSelects();
  renderCal();renderKpis();renderHourly();
}
function syncDateSelects(){
  const ss=document.getElementById('startSel'),es=document.getElementById('endSel');
  if(rangeStart) ss.value=rangeStart;
  if(rangeEnd) es.value=rangeEnd;
  else if(rangeStart) es.value=rangeStart;
}
function setPreset(days,btn){
  document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));
  if(btn) btn.classList.add('on');
  pickingEnd=false;
  const allDates=getData(curStore).map(r=>r.date).filter(Boolean).sort();
  if(!allDates.length){rangeStart=null;rangeEnd=null;renderCal();renderKpis();renderHourly();return;}
  const last=allDates[allDates.length-1];
  if(days===0){rangeStart=allDates[0];rangeEnd=last;}
  else{const from=new Date(last);from.setDate(from.getDate()-(days-1));rangeStart=from.toISOString().slice(0,10);rangeEnd=last;}
  calYear=parseInt(rangeEnd.slice(0,4));calMonth=parseInt(rangeEnd.slice(5,7))-1;
  syncDateSelects();renderCal();renderKpis();renderHourly();
}
function renderRangeHint(){
  const el=document.getElementById('rangeHint');
  if(!rangeStart){el.textContent='날짜를 클릭하거나 드롭다운에서 기간을 선택하세요';return;}
  if(pickingEnd){el.textContent=`시작일: ${rangeStart} — 종료일을 선택하세요`;return;}
  const e=rangeEnd||rangeStart;
  const cnt=filtered().filter(r=>!r.isCancel).length;
  const days=[...new Set(filtered().map(r=>r.date))].length;
  el.textContent=`${rangeStart} ~ ${e} · ${days}일 · 승인 ${cnt.toLocaleString()}건`;
}

// ── KPI ─────────────────────────────────────────────────
function renderKpis(){
  const d=filtered();
  const sales=d.filter(r=>!r.isCancel);
  const total=d.reduce((s,r)=>s+r.amt,0);
  const cnt=sales.length;
  const days=[...new Set(d.map(r=>r.date))].length;
  const avg=days?Math.round(total/days):0;
  const hAgg={};
  sales.forEach(r=>{hAgg[r.hour]=(hAgg[r.hour]||0)+r.amt;});
  const peak=Object.entries(hAgg).sort((a,b)=>b[1]-a[1])[0];
  const fmt=v=>v>=10000?(v/10000).toFixed(1)+'만':v.toLocaleString();
  document.getElementById('kpis').innerHTML=`
    <div class="kpi"><div class="kpi-l">총 매출 (순)</div><div class="kpi-v">${fmt(total)}</div><div class="kpi-s">${total.toLocaleString()}원</div></div>
    <div class="kpi"><div class="kpi-l">승인 건수</div><div class="kpi-v">${cnt.toLocaleString()}건</div><div class="kpi-s">${days}일간</div></div>
    <div class="kpi"><div class="kpi-l">일 평균</div><div class="kpi-v">${fmt(avg)}</div><div class="kpi-s">${days}일 기준</div></div>
    <div class="kpi"><div class="kpi-l">피크 시간</div><div class="kpi-v">${peak?peak[0]+':00':'-'}</div><div class="kpi-s">${peak?peak[1].toLocaleString()+'원':''}</div></div>
  `;
}

// ── 차트 ────────────────────────────────────────────────
function renderHourly(){
  const d=filtered();
  const hAgg={};
  d.filter(r=>!r.isCancel).forEach(r=>{hAgg[r.hour]=(hAgg[r.hour]||0)+r.amt;});
  const hours=[];for(let i=7;i<=21;i++)hours.push(i);
  const amts=hours.map(h=>hAgg[h]||0);
  const maxA=Math.max(...amts);
  const maxH=maxA>0?hours[amts.indexOf(maxA)]:null;
  const total=amts.reduce((s,a)=>s+a,0);
  document.getElementById('peakLine').innerHTML=maxH!==null
    ?`<span class="peak-pill">피크</span><span style="font-size:12px;color:var(--text2);margin-left:6px">${maxH}:00대 · ${maxA.toLocaleString()}원 · 전체의 ${Math.round(maxA/total*100)}%</span>`:'';
  if(hChart)hChart.destroy();
  hChart=new Chart(document.getElementById('hc'),{
    type:'bar',
    data:{labels:hours.map(h=>h+':00'),datasets:[{data:amts,backgroundColor:amts.map(a=>a>0&&a===maxA?'#BA7517':'#378ADD'),borderRadius:5,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.y.toLocaleString()+'원'}}},
      scales:{x:{grid:{display:false},ticks:{font:{size:11},autoSkip:false}},y:{grid:{color:'rgba(128,128,128,0.08)'},ticks:{callback:v=>v>=10000?(v/10000).toFixed(0)+'만':v.toLocaleString(),font:{size:11}},beginAtZero:true}}}
  });
}

// ── 토스트 ───────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── 시작 ────────────────────────────────────────────────
checkDB();
</script>
</body>
